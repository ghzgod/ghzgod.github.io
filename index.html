<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>⚡</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='26' font-size='26'%3E%E2%9A%A1%3C/text%3E%3C/svg%3E" />
<meta name="description" content="⚡" />
<style>
  :root { --volt: #38f6ff; --arc: #7cf9ff; --violet: #b061ff; --hot: #eaffff; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #01030a; }
  body { position: fixed; inset: 0; touch-action: manipulation; }
  #sky { position: absolute; inset: 0; display: block; }
  /* faint tooltip that appears on hover only – wordless by default */
  #tip {
    position: fixed; z-index: 5; pointer-events: none;
    padding: .3rem .7rem; transform: translate(-50%, -160%);
    font: 600 12px/1 ui-monospace, "SF Mono", Menlo, monospace;
    letter-spacing: .28em; text-transform: uppercase;
    color: var(--hot); background: rgba(3,10,24,.6);
    border: 1px solid rgba(56,246,255,.5);
    border-radius: 2px; opacity: 0; transition: opacity .18s;
    text-shadow: 0 0 10px var(--volt); white-space: nowrap;
    backdrop-filter: blur(3px);
  }
  #tip.on { opacity: .92; }
  /* boot / offline spark */
  #boot {
    position: fixed; inset: 0; display: grid; place-items: center; z-index: 8;
    color: var(--volt); font: 300 clamp(3rem, 20vw, 9rem)/1 system-ui;
    text-shadow: 0 0 40px var(--volt), 0 0 80px var(--violet);
    transition: opacity .6s; pointer-events: none;
    animation: flicker 2.4s infinite;
  }
  #boot.gone { opacity: 0; }
  @keyframes flicker {
    0%,19%,21%,50%,52%,100% { opacity: 1; }
    20%,51% { opacity: .35; }
  }
  canvas { cursor: crosshair; }
  @media (prefers-reduced-motion: reduce) { #boot { animation: none; } }
</style>
</head>
<body>
  <canvas id="sky"></canvas>
  <div id="boot">⚡</div>
  <div id="tip" aria-hidden="true"></div>

<script>
(() => {
  'use strict';
  const USER = 'ghzgod';
  const canvas = document.getElementById('sky');
  const ctx = canvas.getContext('2d');
  const tip = document.getElementById('tip');
  const boot = document.getElementById('boot');
  const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;

  let W = 0, H = 0, DPR = 1;
  function resize() {
    DPR = Math.min(2, devicePixelRatio || 1);
    W = innerWidth; H = innerHeight;
    canvas.width = W * DPR; canvas.height = H * DPR;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    layout();
  }
  addEventListener('resize', resize);

  // ---- state ----
  const nodes = [];      // project orbs
  let core = { x: 0, y: 0, r: 0, phase: 0 };
  let hovered = null;
  const pointer = { x: -1e3, y: -1e3, down: false };
  const sparks = [];     // drifting electrons

  // deterministic jitter per index (no Math.random dependence for positions)
  const hash = (n) => { const s = Math.sin(n * 12.9898) * 43758.5453; return s - Math.floor(s); };

  function layout() {
    core.x = W / 2; core.y = H / 2;
    core.r = Math.max(26, Math.min(W, H) * 0.06);
    const n = nodes.length || 1;
    const ring = Math.min(W, H) * (n > 8 ? 0.40 : 0.33);
    nodes.forEach((nd, i) => {
      const a = (i / n) * Math.PI * 2 - Math.PI / 2;
      nd.baseA = a;
      nd.orbit = ring * (0.7 + 0.3 * hash(i + 1));
      nd.r = Math.max(13, core.r * (0.42 + 0.16 * hash(i * 3 + 2)));
      nd.spin = (hash(i + 5) - 0.5) * 0.00028;   // slow drift
      nd.pulse = hash(i + 9) * Math.PI * 2;
    });
  }

  // ---- lightning: midpoint-displacement jagged path ----
  function bolt(x1, y1, x2, y2, disp, t) {
    const pts = [[x1, y1], [x2, y2]];
    let d = disp, passes = 5;
    while (passes--) {
      const np = [];
      for (let i = 0; i < pts.length - 1; i++) {
        const [ax, ay] = pts[i], [bx, by] = pts[i + 1];
        const mx = (ax + bx) / 2, my = (ay + by) / 2;
        const nx = -(by - ay), ny = (bx - ax);
        const len = Math.hypot(nx, ny) || 1;
        // wobble with time so the arc crackles
        const off = (Math.sin((i + 1) * 91.7 + t) ) * d;
        np.push([ax, ay], [mx + (nx / len) * off, my + (ny / len) * off]);
      }
      np.push(pts[pts.length - 1]);
      pts.length = 0; pts.push(...np);
      d *= 0.5;
    }
    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
    ctx.stroke();
  }

  function drawArc(x1, y1, x2, y2, intensity, t) {
    const dist = Math.hypot(x2 - x1, y2 - y1);
    const disp = Math.min(60, dist * 0.14) * (0.6 + 0.4 * intensity);
    // outer glow
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.strokeStyle = 'rgba(56,246,255,' + (0.10 + 0.22 * intensity) + ')';
    ctx.lineWidth = 6 * intensity + 2; ctx.shadowColor = '#38f6ff'; ctx.shadowBlur = 24 * intensity + 6;
    bolt(x1, y1, x2, y2, disp, t);
    // hot core of the bolt
    ctx.shadowBlur = 10;
    ctx.strokeStyle = 'rgba(234,255,255,' + (0.5 + 0.5 * intensity) + ')';
    ctx.lineWidth = 1.4 + intensity;
    bolt(x1, y1, x2, y2, disp * 0.7, t * 1.3 + 3);
    ctx.restore();
  }

  function drawCore(t) {
    const pulse = 1 + Math.sin(t * 2) * 0.06;
    const r = core.r * pulse;
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    // halo
    const g = ctx.createRadialGradient(core.x, core.y, 0, core.x, core.y, r * 4);
    g.addColorStop(0, 'rgba(176,97,255,0.5)');
    g.addColorStop(0.3, 'rgba(56,246,255,0.28)');
    g.addColorStop(1, 'rgba(1,3,10,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(core.x, core.y, r * 4, 0, 7); ctx.fill();
    // crackling corona
    const bolts = reduce ? 0 : 7;
    for (let i = 0; i < bolts; i++) {
      const a = t * 0.6 + i * (6.28 / bolts);
      const rr = r * (1.25 + hash(i + Math.floor(t * 3)) * 0.8);
      drawArc(core.x, core.y, core.x + Math.cos(a) * rr, core.y + Math.sin(a) * rr, 0.5, t * 5 + i);
    }
    // white-hot center
    ctx.shadowColor = '#eaffff'; ctx.shadowBlur = 40;
    const cg = ctx.createRadialGradient(core.x, core.y, 0, core.x, core.y, r);
    cg.addColorStop(0, '#ffffff');
    cg.addColorStop(0.5, '#7cf9ff');
    cg.addColorStop(1, 'rgba(56,246,255,0)');
    ctx.fillStyle = cg;
    ctx.beginPath(); ctx.arc(core.x, core.y, r, 0, 7); ctx.fill();
    ctx.restore();
  }

  function nodePos(nd, t) {
    const a = nd.baseA + t * (reduce ? 0 : 1) * nd.spin * 1000;
    return { x: core.x + Math.cos(a) * nd.orbit, y: core.y + Math.sin(a) * nd.orbit, a };
  }

  function drawNode(nd, t) {
    const p = nodePos(nd, t); nd.x = p.x; nd.y = p.y;
    const hot = nd === hovered;
    const pulse = 1 + Math.sin(t * 3 + nd.pulse) * 0.12 + (hot ? 0.35 : 0);
    const r = nd.r * pulse;
    // arc from core to node
    const flick = 0.55 + 0.45 * Math.abs(Math.sin(t * 7 + nd.pulse));
    drawArc(core.x, core.y, nd.x, nd.y, (hot ? 1 : 0.5) * flick, t * 6 + nd.pulse * 10);
    // orb
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.shadowColor = hot ? '#b061ff' : '#38f6ff';
    ctx.shadowBlur = hot ? 45 : 22;
    const og = ctx.createRadialGradient(nd.x, nd.y, 0, nd.x, nd.y, r);
    og.addColorStop(0, '#ffffff');
    og.addColorStop(0.45, hot ? '#d7b4ff' : '#7cf9ff');
    og.addColorStop(1, 'rgba(56,246,255,0)');
    ctx.fillStyle = og;
    ctx.beginPath(); ctx.arc(nd.x, nd.y, r, 0, 7); ctx.fill();
    // ring
    ctx.shadowBlur = hot ? 30 : 12;
    ctx.strokeStyle = hot ? 'rgba(216,180,255,0.9)' : 'rgba(124,249,255,0.6)';
    ctx.lineWidth = hot ? 2 : 1.2;
    ctx.beginPath(); ctx.arc(nd.x, nd.y, r * 1.5, 0, 7); ctx.stroke();
    ctx.restore();
  }

  function drawSparks(t) {
    if (reduce) return;
    for (const s of sparks) {
      s.x += s.vx; s.y += s.vy; s.life -= 1;
      if (s.life <= 0 || s.x < 0 || s.x > W || s.y < 0 || s.y > H) {
        s.x = hash(s.id + Math.floor(t)) * W;
        s.y = hash(s.id * 2 + Math.floor(t)) * H;
        const a = hash(s.id * 3) * 6.28; const sp = 0.2 + hash(s.id) * 0.5;
        s.vx = Math.cos(a) * sp; s.vy = Math.sin(a) * sp; s.life = 120 + hash(s.id) * 200;
      }
      ctx.save(); ctx.globalCompositeOperation = 'lighter';
      ctx.fillStyle = 'rgba(124,249,255,' + (0.15 + 0.3 * (s.life / 300)) + ')';
      ctx.shadowColor = '#38f6ff'; ctx.shadowBlur = 6;
      ctx.fillRect(s.x, s.y, 1.6, 1.6); ctx.restore();
    }
  }

  let last = 0;
  function frame(ms) {
    const t = ms / 1000;
    // trailing fade for motion blur
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = 'rgba(1,3,10,' + (reduce ? 1 : 0.28) + ')';
    ctx.fillRect(0, 0, W, H);
    drawSparks(t);
    drawCore(t);
    hovered = null;
    for (const nd of nodes) {
      const p = nodePos(nd, t);
      if (Math.hypot(pointer.x - p.x, pointer.y - p.y) < nd.r * 1.8) hovered = nd;
    }
    for (const nd of nodes) drawNode(nd, t);
    // tooltip
    if (hovered) {
      tip.textContent = hovered.label;
      tip.style.left = hovered.x + 'px'; tip.style.top = hovered.y + 'px';
      tip.classList.add('on'); canvas.style.cursor = 'pointer';
    } else { tip.classList.remove('on'); canvas.style.cursor = 'crosshair'; }
    requestAnimationFrame(frame);
  }

  // ---- interaction ----
  function moveTo(x, y) { pointer.x = x; pointer.y = y; }
  canvas.addEventListener('mousemove', (e) => moveTo(e.clientX, e.clientY));
  canvas.addEventListener('mouseleave', () => moveTo(-1e3, -1e3));
  canvas.addEventListener('click', () => { if (hovered) window.location.href = hovered.url; });
  canvas.addEventListener('touchstart', (e) => {
    const tch = e.touches[0]; moveTo(tch.clientX, tch.clientY);
  }, { passive: true });
  canvas.addEventListener('touchend', () => { if (hovered) window.location.href = hovered.url; });

  // ---- data: auto-scan the user's projects ----
  function addProjects(list) {
    nodes.length = 0;
    for (const p of list) nodes.push({ label: p.label, url: p.url });
    for (let i = 0; i < 60; i++) sparks.push({ id: i, x: 0, y: 0, vx: 0, vy: 0, life: 0 });
    layout();
    boot.classList.add('gone');
  }

  async function scan() {
    try {
      const res = await fetch(`https://api.github.com/users/${USER}/repos?per_page=100&sort=pushed`, {
        headers: { Accept: 'application/vnd.github+json' },
      });
      if (!res.ok) throw new Error('gh ' + res.status);
      const repos = await res.json();
      const live = repos
        .filter((r) => r.has_pages && !r.fork && !r.archived)
        .map((r) => ({
          label: r.name,
          // user/root pages repo serves at the apex; others at /<name>/
          url: r.name.toLowerCase() === `${USER}.github.io`
            ? `https://${USER}.github.io/`
            : (r.homepage && /^https?:/.test(r.homepage) ? r.homepage : `https://${USER}.github.io/${r.name}/`),
          pushed: r.pushed_at,
        }));
      if (!live.length) throw new Error('no pages yet');
      addProjects(live);
    } catch (err) {
      // Offline / rate-limited: keep the lone spark pulsing, retry a few times.
      if ((scan.tries = (scan.tries || 0) + 1) < 4) return setTimeout(scan, 4000);
    }
  }

  resize();
  requestAnimationFrame(frame);
  scan();
})();
</script>
</body>
</html>
