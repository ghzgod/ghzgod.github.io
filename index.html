<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Projects · A Working Index</title>
<meta name="description" content="A working index of software projects: live sites, tools, and experiments." />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='6' fill='%23d8b365'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,550;1,9..144,340&family=Instrument+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink:        oklch(0.185 0.018 275);   /* deep indigo-charcoal, never pure black */
    --ink-raise:  oklch(0.225 0.02 275);
    --paper:      oklch(0.93 0.012 85);     /* warm off-white */
    --paper-dim:  oklch(0.72 0.014 85);
    --paper-faint:oklch(0.52 0.014 275);
    --gold:       oklch(0.8 0.095 85);      /* champagne */
    --gold-deep:  oklch(0.68 0.11 78);
    --hairline:   oklch(0.34 0.02 275);
    --serif: "Fraunces", Georgia, serif;
    --sans: "Instrument Sans", "Helvetica Neue", sans-serif;
    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--ink);
    color: var(--paper);
    font-family: var(--sans);
    font-size: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  ::selection { background: var(--gold); color: var(--ink); }

  /* ---- ambient canvas: drifting motes ---- */
  #dust {
    position: fixed; inset: 0; z-index: 0;
    pointer-events: none;
  }

  .page {
    position: relative; z-index: 1;
    max-width: 68rem;
    margin: 0 auto;
    padding: 0 clamp(1.25rem, 5vw, 4rem);
  }

  /* ---- top bar ---- */
  header.top {
    display: flex; justify-content: space-between; align-items: baseline;
    padding-top: clamp(1.5rem, 4vh, 3rem);
    font-size: 0.8rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--paper-dim);
  }
  header.top a {
    color: var(--paper-dim); text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: color 0.25s, border-color 0.25s;
  }
  header.top a:hover, header.top a:focus-visible { color: var(--gold); border-color: var(--gold-deep); }

  /* ---- hero ---- */
  .hero {
    padding: clamp(5rem, 16vh, 11rem) 0 clamp(4rem, 10vh, 7rem);
    max-width: 46rem;
  }
  .hero .eyebrow {
    font-size: 0.8rem; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1.75rem;
    display: flex; align-items: center; gap: 0.9rem;
  }
  .hero .eyebrow::before {
    content: ""; width: 2.6rem; height: 1px; background: var(--gold-deep);
    display: inline-block;
  }
  h1 {
    font-family: var(--serif);
    font-weight: 300;
    font-size: clamp(2.4rem, 2rem + 4.5vw, 4.9rem);
    line-height: 1.06;
    letter-spacing: -0.015em;
    text-wrap: balance;
  }
  h1 em {
    font-style: italic; font-weight: 340;
    color: var(--gold);
  }
  /* staggered reveal on load */
  .rise { opacity: 0; transform: translateY(18px); animation: rise 0.9s var(--ease-out) forwards; }
  .rise.d1 { animation-delay: 0.08s; } .rise.d2 { animation-delay: 0.2s; } .rise.d3 { animation-delay: 0.34s; }
  @keyframes rise { to { opacity: 1; transform: none; } }

  /* ---- section headings ---- */
  .section { padding: clamp(2.5rem, 7vh, 5rem) 0; }
  .section-head {
    display: flex; align-items: baseline; gap: 1.25rem;
    border-bottom: 1px solid var(--hairline);
    padding-bottom: 1rem; margin-bottom: 0.5rem;
  }
  .section-head h2 {
    font-family: var(--serif); font-weight: 400; font-style: italic;
    font-size: clamp(1.35rem, 1.2rem + 0.8vw, 1.9rem);
    letter-spacing: 0.01em;
  }
  .section-head .count {
    font-size: 0.78rem; letter-spacing: 0.18em; color: var(--paper-faint);
    text-transform: uppercase;
  }
  .section-head .hint {
    margin-left: auto; font-size: 0.78rem; letter-spacing: 0.1em;
    color: var(--paper-faint); text-transform: uppercase;
  }

  /* ---- project index rows ---- */
  .index { list-style: none; }
  .index li { border-bottom: 1px solid var(--hairline); }
  .index li:last-child { border-bottom: none; }
  .row {
    display: grid;
    grid-template-columns: 3.2rem 1fr auto;
    gap: clamp(1rem, 3vw, 2.5rem);
    align-items: baseline;
    padding: clamp(1.4rem, 3.5vh, 2.1rem) 0.25rem;
    text-decoration: none; color: inherit;
    position: relative;
    transition: background 0.35s var(--ease-out);
  }
  .row .num {
    font-family: var(--serif); font-style: italic; font-weight: 340;
    color: var(--paper-faint); font-size: 0.95rem;
    transition: color 0.3s;
  }
  .row .name {
    font-family: var(--serif); font-weight: 400;
    font-size: clamp(1.5rem, 1.25rem + 1.6vw, 2.4rem);
    line-height: 1.15; letter-spacing: -0.01em;
    transition: color 0.3s;
  }
  .row .desc {
    display: block; font-family: var(--sans);
    font-size: 0.95rem; color: var(--paper-dim);
    margin-top: 0.45rem; max-width: 38rem;
  }
  .row .meta {
    text-align: right; font-size: 0.75rem; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--paper-faint);
    white-space: nowrap;
    display: grid; gap: 0.35rem; justify-items: end;
    transition: opacity 0.2s;
  }
  .row .meta .lang { color: var(--paper-dim); }
  .row .go {
    position: absolute; right: 0.25rem; top: 50%;
    transform: translate(-14px, -50%);
    opacity: 0; font-size: 1.5rem; color: var(--gold);
    transition: opacity 0.3s, transform 0.45s var(--ease-out);
    pointer-events: none;
  }
  @media (hover: hover) {
    .row:hover, .row:focus-visible { background: var(--ink-raise); }
    .row:hover .name, .row:focus-visible .name { color: var(--gold); }
    .row:hover .num { color: var(--gold-deep); }
    .row:hover .meta { opacity: 0; }
    .row:hover .go, .row:focus-visible .go { opacity: 1; transform: translate(0, -50%); }
  }
  .row:focus-visible { outline: 2px solid var(--gold-deep); outline-offset: -2px; }

  /* source list (non-pages repos) – quieter, two columns */
  .source-grid {
    list-style: none;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(19rem, 1fr));
    column-gap: clamp(2rem, 5vw, 4rem);
  }
  .source-grid li { border-bottom: 1px solid var(--hairline); }
  .srow {
    display: block; padding: 1.15rem 0.25rem; text-decoration: none; color: inherit;
  }
  .srow .name {
    font-family: var(--serif); font-size: 1.2rem; font-weight: 400;
    transition: color 0.25s;
  }
  .srow .desc { display: block; font-size: 0.88rem; color: var(--paper-dim); margin-top: 0.3rem; }
  .srow .lang { display: block; font-size: 0.72rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--paper-faint); margin-top: 0.55rem; }
  .srow:hover .name, .srow:focus-visible .name { color: var(--gold); }

  /* scroll reveal */
  .veil { opacity: 0; transform: translateY(22px); transition: opacity 0.8s var(--ease-out), transform 0.8s var(--ease-out); }
  .veil.seen { opacity: 1; transform: none; }

  /* loading shimmer rows */
  .ghost { border-bottom: 1px solid var(--hairline); padding: 1.9rem 0.25rem; }
  .ghost .bar {
    height: 1.7rem; width: 42%; border-radius: 2px;
    background: linear-gradient(100deg, var(--ink-raise) 40%, oklch(0.27 0.02 275) 50%, var(--ink-raise) 60%);
    background-size: 200% 100%;
    animation: shimmer 1.6s linear infinite;
  }
  @keyframes shimmer { to { background-position: -200% 0; } }

  .apology { padding: 2.5rem 0.25rem; color: var(--paper-dim); font-size: 0.95rem; }
  .apology a { color: var(--gold); }

  /* ---- footer ---- */
  footer {
    margin-top: clamp(4rem, 10vh, 8rem);
    padding: 2.5rem 0 3rem;
    border-top: 1px solid var(--hairline);
    display: flex; justify-content: space-between; align-items: baseline;
    gap: 1rem; flex-wrap: wrap;
    font-size: 0.8rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--paper-faint);
  }
  footer a { color: var(--paper-dim); text-decoration: none; border-bottom: 1px solid transparent; transition: color .25s, border-color .25s; }
  footer a:hover { color: var(--gold); border-color: var(--gold-deep); }

  @media (max-width: 40rem) {
    .row { grid-template-columns: 2.1rem 1fr; }
    .row .meta { display: none; }
    .row .go { display: none; }
    .section-head .hint { display: none; }
  }
  @media (prefers-reduced-motion: reduce) {
    .rise, .veil { animation: none; transition: none; opacity: 1; transform: none; }
    #dust { display: none; }
    html { scroll-behavior: auto; }
  }
</style>
</head>
<body>
<canvas id="dust" aria-hidden="true"></canvas>

<div class="page">
  <header class="top rise">
    <span>Portfolio</span>
    <a href="https://github.com/ghzgod" rel="me">github.com/ghzgod</a>
  </header>

  <section class="hero">
    <p class="eyebrow rise d1">A working index</p>
    <h1 class="rise d2">Software, shipped.<br />Tools, experiments &amp; <em>small machines</em> for the web.</h1>
  </section>

  <section class="section" id="live" aria-labelledby="live-h">
    <div class="section-head veil">
      <h2 id="live-h">Live projects</h2>
      <span class="count" id="live-count"></span>
      <span class="hint">Select to visit</span>
    </div>
    <ul class="index" id="live-list">
      <li class="ghost"><div class="bar"></div></li>
      <li class="ghost"><div class="bar" style="width:31%"></div></li>
      <li class="ghost"><div class="bar" style="width:37%"></div></li>
    </ul>
  </section>

  <section class="section" id="source" aria-labelledby="source-h" hidden>
    <div class="section-head veil">
      <h2 id="source-h">In the workshop</h2>
      <span class="count" id="source-count"></span>
      <span class="hint">Source on GitHub</span>
    </div>
    <ul class="source-grid" id="source-list"></ul>
  </section>

  <footer>
    <span>Made by hand, kept in motion.</span>
    <a href="https://github.com/ghzgod">@ghzgod</a>
  </footer>
</div>

<script>
(() => {
  'use strict';
  const USER = 'ghzgod';
  const SITE_REPO = USER + '.github.io';
  const TTL = 30 * 60 * 1000; // 30 min cache – stays far below the 60 req/h anon limit
  const KEY = 'ghz-repos-v1';

  /* ---------- data ---------- */
  async function getRepos() {
    let cached = null;
    try { cached = JSON.parse(localStorage.getItem(KEY)); } catch (e) {}
    if (cached && Date.now() - cached.at < TTL) return cached.repos;
    try {
      const res = await fetch('https://api.github.com/users/' + USER + '/repos?per_page=100&sort=pushed');
      if (!res.ok) throw new Error(res.status);
      const repos = await res.json();
      try { localStorage.setItem(KEY, JSON.stringify({ at: Date.now(), repos })); } catch (e) {}
      return repos;
    } catch (err) {
      if (cached) return cached.repos; // stale beats nothing
      throw err;
    }
  }

  const titleCase = (name) => name
    .replace(/[-_]+/g, ' ')
    .trim()
    .replace(/\b\w/g, (c) => c.toUpperCase());

  const since = (iso) => {
    if (!iso) return '';
    const days = Math.floor((Date.now() - new Date(iso)) / 86400000);
    if (days < 1) return 'today';
    if (days < 30) return days + 'd ago';
    if (days < 365) return Math.floor(days / 30) + 'mo ago';
    return Math.floor(days / 365) + 'y ago';
  };

  /* ---------- render (createElement only – API text never hits innerHTML) ---------- */
  const el = (tag, cls, text) => {
    const n = document.createElement(tag);
    if (cls) n.className = cls;
    if (text != null) n.textContent = text;
    return n;
  };

  function liveRow(repo, i) {
    const li = el('li', 'veil');
    const a = el('a', 'row');
    a.href = 'https://' + USER + '.github.io/' + repo.name + '/';
    const num = el('span', 'num', String(i + 1).padStart(2, '0'));
    const body = el('span');
    body.appendChild(el('span', 'name', titleCase(repo.name)));
    if (repo.description) body.appendChild(el('span', 'desc', repo.description));
    const meta = el('span', 'meta');
    if (repo.language) meta.appendChild(el('span', 'lang', repo.language));
    meta.appendChild(el('span', null, since(repo.pushed_at)));
    const go = el('span', 'go', '→');
    go.setAttribute('aria-hidden', 'true');
    a.append(num, body, meta, go);
    li.appendChild(a);
    return li;
  }

  function sourceRow(repo) {
    const li = el('li', 'veil');
    const a = el('a', 'srow');
    a.href = repo.html_url;
    a.appendChild(el('span', 'name', titleCase(repo.name)));
    if (repo.description) a.appendChild(el('span', 'desc', repo.description));
    a.appendChild(el('span', 'lang', (repo.language || 'Misc') + ' · ' + since(repo.pushed_at)));
    li.appendChild(a);
    return li;
  }

  const observer = ('IntersectionObserver' in window)
    ? new IntersectionObserver((entries) => {
        for (const e of entries) if (e.isIntersecting) { e.target.classList.add('seen'); observer.unobserve(e.target); }
      }, { threshold: 0.1 })
    : null;
  const watch = (node) => observer ? observer.observe(node) : node.classList.add('seen');
  document.querySelectorAll('.veil').forEach(watch);

  async function build() {
    const liveList = document.getElementById('live-list');
    try {
      const repos = (await getRepos()).filter((r) => !r.fork && !r.archived);
      const live = repos.filter((r) => r.has_pages && r.name !== SITE_REPO)
                        .sort((a, b) => new Date(b.pushed_at) - new Date(a.pushed_at));
      const source = repos.filter((r) => !r.has_pages)
                          .sort((a, b) => new Date(b.pushed_at) - new Date(a.pushed_at));

      liveList.textContent = '';
      if (live.length) {
        live.forEach((r, i) => { const row = liveRow(r, i); liveList.appendChild(row); watch(row); });
        document.getElementById('live-count').textContent = 'No. 01 / ' + String(live.length).padStart(2, '0');
      } else {
        liveList.appendChild(el('li', 'apology', 'Nothing deployed right now. The workshop below is where things are happening.'));
      }

      if (source.length) {
        const sec = document.getElementById('source');
        sec.hidden = false;
        const list = document.getElementById('source-list');
        source.forEach((r) => { const row = sourceRow(r); list.appendChild(row); watch(row); });
        document.getElementById('source-count').textContent = String(source.length) + ' repositories';
      }
    } catch (err) {
      liveList.textContent = '';
      const li = el('li', 'apology');
      li.append('The live index could not be reached. Everything is still at ');
      const a = el('a', null, 'github.com/' + USER);
      a.href = 'https://github.com/' + USER;
      li.append(a, '.');
      liveList.appendChild(li);
    }
  }
  build();

  /* ---------- ambient dust motes ---------- */
  if (!matchMedia('(prefers-reduced-motion: reduce)').matches) {
    const canvas = document.getElementById('dust');
    const ctx = canvas.getContext('2d');
    let W, H, DPR;
    const motes = [];
    const COUNT = 42;

    function resize() {
      DPR = Math.min(2, devicePixelRatio || 1);
      W = innerWidth; H = innerHeight;
      canvas.width = W * DPR; canvas.height = H * DPR;
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    }
    resize();
    addEventListener('resize', resize);

    for (let i = 0; i < COUNT; i++) {
      motes.push({
        x: Math.random() * innerWidth,
        y: Math.random() * innerHeight,
        r: 0.5 + Math.random() * 1.4,
        vx: (Math.random() - 0.5) * 0.08,
        vy: -0.03 - Math.random() * 0.09,
        tw: Math.random() * Math.PI * 2,
        golden: Math.random() < 0.18
      });
    }

    let last = 0, visible = !document.hidden;
    document.addEventListener('visibilitychange', () => { visible = !document.hidden; });

    function frame(t) {
      requestAnimationFrame(frame);
      if (!visible || t - last < 33) return; // ~30fps is plenty for dust
      last = t;
      ctx.clearRect(0, 0, W, H);
      for (const m of motes) {
        m.x += m.vx; m.y += m.vy; m.tw += 0.012;
        if (m.y < -4) { m.y = H + 4; m.x = Math.random() * W; }
        if (m.x < -4) m.x = W + 4;
        if (m.x > W + 4) m.x = -4;
        const a = 0.10 + 0.16 * (0.5 + 0.5 * Math.sin(m.tw));
        ctx.beginPath();
        ctx.arc(m.x, m.y, m.r, 0, Math.PI * 2);
        ctx.fillStyle = m.golden
          ? 'rgba(216, 179, 101,' + (a * 1.5).toFixed(3) + ')'
          : 'rgba(214, 214, 228,' + a.toFixed(3) + ')';
        ctx.fill();
      }
    }
    requestAnimationFrame(frame);
  }
})();
</script>
</body>
</html>
